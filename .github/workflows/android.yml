name: Android APK

# Builds the Capacitor Android shell of the VARSITY web app into a sideloadable debug .apk in a
# clean room, and uploads it as a downloadable artifact. The APK wraps the exact same built web
# front end (apps/web/dist) -- no separate codebase. Scoped to the mobile paths + manual dispatch
# so it never slows the main CI on unrelated changes.

on:
  pull_request:
    paths:
      - 'apps/web/android/**'
      - 'apps/web/capacitor.config.ts'
      - '.github/workflows/android.yml'
  workflow_dispatch: {}

jobs:
  apk:
    name: Build debug APK (Capacitor)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Build the web app and sync Capacitor
        working-directory: apps/web
        run: |
          # Same retry guards as the main CI web job: onnxruntime-node's postinstall binary fetch
          # intermittently times out, and npm can skip the platform lightningcss binary.
          for i in 1 2 3; do npm ci && break || { echo "npm ci attempt $i failed; retrying"; rm -rf node_modules; sleep 5; }; done
          node -e "require('lightningcss')" 2>/dev/null \
            || { echo "lightningcss native binary missing; reinstalling"; rm -rf node_modules; npm install; }
          npm run build
          npx cap sync android
      - name: Assemble debug APK
        working-directory: apps/web/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: varsity-debug-apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
