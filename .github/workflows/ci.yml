name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Front end (lint / typecheck / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Build web if present
        run: |
          if [ -f apps/web/package.json ]; then
            cd apps/web
            npm ci
            # npm intermittently skips the platform-specific lightningcss binary
            # (optional-dep extraction race); reinstall if it failed to land.
            node -e "require('lightningcss')" 2>/dev/null \
              || { echo "lightningcss native binary missing; reinstalling"; rm -rf node_modules; npm install; }
            npm run lint --if-present
            npm run typecheck --if-present
            npm run build --if-present
            npm test --if-present
          else
            echo "apps/web not scaffolded yet; skipping."
          fi

  a11y:
    name: Accessibility (Playwright + axe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Playwright + axe-core a11y suite
        run: |
          if [ -f apps/web/playwright.config.ts ]; then
            cd apps/web
            npm ci
            # Same lightningcss optional-dep guard as the web job (see above).
            node -e "require('lightningcss')" 2>/dev/null \
              || { echo "lightningcss native binary missing; reinstalling"; rm -rf node_modules; npm install; }
            npx playwright install --with-deps chromium
            npm run build
            npm run test:e2e
          else
            echo "no playwright config yet; skipping."
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  api:
    name: Backend (lint / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Test services if present
        run: |
          if [ -f services/requirements.txt ] || [ -f services/pyproject.toml ]; then
            cd services
            python -m pip install --upgrade pip
            [ -f requirements.txt ] && pip install -r requirements.txt || true
            [ -f pyproject.toml ] && pip install -e . || true
            pip install ruff pytest hypothesis z3-solver
            ruff check .
            pytest -q
          else
            echo "services not scaffolded yet; skipping."
          fi

  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: No tracked .env
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "A real .env is tracked. Remove it."; exit 1
          fi
          echo "No tracked .env. OK."
