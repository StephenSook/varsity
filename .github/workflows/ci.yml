name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Front end (lint / typecheck / build / test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Build web if present
        run: |
          if [ -f apps/web/package.json ]; then
            cd apps/web
            # Retry npm ci: onnxruntime-node's postinstall fetches a native binary from a CDN
            # that intermittently times out (ETIMEDOUT) on GitHub runners; a clean retry clears it.
            for i in 1 2 3; do npm ci && break || { echo "npm ci attempt $i failed; retrying"; rm -rf node_modules; sleep 5; }; done
            # npm intermittently skips the platform-specific lightningcss binary
            # (optional-dep extraction race); reinstall if it failed to land.
            node -e "require('lightningcss')" 2>/dev/null \
              || { echo "lightningcss native binary missing; reinstalling"; rm -rf node_modules; npm install; }
            npm run lint --if-present
            npm run typecheck --if-present
            npm run build --if-present
            npm test --if-present
          else
            echo "apps/web not scaffolded yet; skipping."
          fi

  a11y:
    name: Accessibility (Playwright + axe)
    runs-on: ubuntu-latest
    # Browser install + Playwright + axe normally runs in ~5-8 min; 20 caps a runner hang
    # (one stalled 38 min with no bound on 2026-06-18) without risking a false timeout.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Playwright + axe-core a11y suite
        run: |
          if [ -f apps/web/playwright.config.ts ]; then
            cd apps/web
            # Retry npm ci: onnxruntime-node's postinstall binary fetch intermittently times out
            # on GitHub runners (ETIMEDOUT); a clean retry clears it (see the web job).
            for i in 1 2 3; do npm ci && break || { echo "npm ci attempt $i failed; retrying"; rm -rf node_modules; sleep 5; }; done
            # Same lightningcss optional-dep guard as the web job (see above).
            node -e "require('lightningcss')" 2>/dev/null \
              || { echo "lightningcss native binary missing; reinstalling"; rm -rf node_modules; npm install; }
            npx playwright install --with-deps chromium
            npm run build
            npm run test:e2e
          else
            echo "no playwright config yet; skipping."
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  api:
    name: Backend (lint / test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Test services if present
        run: |
          if [ -f services/requirements.txt ] || [ -f services/pyproject.toml ]; then
            cd services
            python -m pip install --upgrade pip
            # No `|| true`: a real install failure must red the run, not silently ship a broken
            # requirements.txt. (pytest resolves the package via pythonpath, so no editable install.)
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
            pip install ruff pytest hypothesis z3-solver
            ruff check .
            pytest -q
          else
            echo "services not scaffolded yet; skipping."
          fi

  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: No tracked .env
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "A real .env is tracked. Remove it."; exit 1
          fi
          echo "No tracked .env. OK."
