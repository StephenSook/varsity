<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="VARSITY">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#152441"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <line x1="13.5" y1="6.5" x2="13.5" y2="25.5" stroke="#34d399" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="21" cy="16" r="2.7" fill="#38bdf8"/>
  </g>
</svg>
