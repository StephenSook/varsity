<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0f1c" />
    <!-- Installable PWA: when added to the Home Screen the app opens standalone (chromeless), like a
         native app. The web manifest (vite-plugin-pwa) drives standalone display on current iOS/Android;
         these tags add the dark iOS status bar and the Home Screen title, and cover older iOS. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="VARSITY" />
    <!-- Warm the cross-origin backend connection (DNS + TLS) before the first Explain,
         so the spoken verdict is not delayed by a fresh handshake to Render. -->
    <link rel="preconnect" href="https://varsity-api.onrender.com" crossorigin />
    <meta
      name="description"
      content="Real-time, screen-reader-native, IFAB-grounded explanations of VAR and offside decisions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VARSITY" />
    <meta property="og:title" content="VARSITY: VAR offside, explained for blind fans" />
    <meta
      property="og:description"
      content="The first real-time, screen-reader-native, IFAB-grounded AI that explains VAR and offside decisions to blind football fans."
    />
    <meta property="og:url" content="https://web-chi-wine-13.vercel.app/" />
    <meta property="og:image" content="https://web-chi-wine-13.vercel.app/og-banner.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VARSITY: VAR offside, explained for blind fans" />
    <meta
      name="twitter:description"
      content="Real-time, screen-reader-native, IFAB-grounded explanations of VAR and offside decisions."
    />
    <meta name="twitter:image" content="https://web-chi-wine-13.vercel.app/og-banner.png" />
    <!-- Self-hosted OFL fonts (see src/index.css @font-face). Preload the hero serif so the
         "VARSITY" wordmark paints with no flash, and the deployed link never waits on Google. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/instrument-serif-normal-latin.woff2"
      crossorigin
    />
    <title>VARSITY: VAR offside, explained for blind fans</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width: 40rem; margin: 4rem auto; padding: 0 1.5rem; font-family: system-ui, sans-serif; color: #e2e8f0; background: #0a0f1c">
        <h1 style="color: #34d399">VARSITY</h1>
        <p>
          VARSITY explains VAR and offside decisions out loud for blind and low-vision
          football fans, grounded in the IFAB Laws of the Game. The live explainer needs
          JavaScript. Please enable it, or read the project and the Laws-grounded method at
          <a style="color: #38bdf8" href="https://github.com/StephenSook/varsity">github.com/StephenSook/varsity</a>.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
